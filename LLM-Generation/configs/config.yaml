server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: 60
  write_timeout: 120
  mode: "debug"  # debug, release, test

# Default LLM provider
llm:
  default_provider: "ollama"
  temperature: 0.7
  max_tokens: 4096

  # OpenAI / OpenAI-compatible (also works for Ollama, vLLM, etc.)
  openai:
    api_key: ""
    base_url: "http://localhost:11434/v1"
    model: "qwen2.5-coder-0.5b-q8_0"

  # Ollama native API
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5-0.5b-instruct-q8_0"

  # ZhipuAI (智谱清言 GLM)
  zhipu:
    api_key: ""
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-flash"

  # Qwen (通义千问 DashScope)
  qwen:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-turbo"

# Conversation management
conversation:
  max_turns: 50
  expire_minutes: 60
  max_sessions: 10000

# Prompt templates
prompt:
  default_system: |
    You are a helpful, accurate, and concise AI assistant. 
    Answer the user's question based on the provided context.
    If the context is insufficient, say so honestly.
  rag_system: |
    You are a knowledge-based AI assistant.
    Use the following retrieved context to answer the user's question.
    If the context doesn't contain enough information, say you don't know.
    Always cite the source when possible.
    
    Context:
    {{.Context}}

# Logging
logging:
  level: "info"
  format: "console"
