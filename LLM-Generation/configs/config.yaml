# LLM Generation Service Configuration
#
# Architecture: NLU(:8080) → RAG(:8081) → LLM-Generation(:8082) → Local-LLM(:11434)
# Local-LLM (C++) provides OpenAI-compatible /v1/chat/completions API.

server:
  host: "0.0.0.0"
  port: 8082
  read_timeout: 600
  write_timeout: 600
  mode: "debug"  # debug, release, test

# Default LLM provider
llm:
  default_provider: "openai"  # Use "openai" to route to Local-LLM
  temperature: 0.7
  max_tokens: 500   # ~1200字中文

  # OpenAI-compatible → points to Local-LLM (C++)
  openai:
    api_key: "not-needed"  # Local-LLM doesn't require an API key
    base_url: "http://localhost:11434/v1"
    model: "Qwen2.5-Coder-7B-Instruct-Q4_K_M"

  # Ollama native API (backup/alternative)
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5-coder:7b-instruct-q4_K_M"

  # ZhipuAI (智谱清言 GLM) — optional cloud provider
  zhipu:
    api_key: ""
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    model: "glm-4-flash"

  # Qwen (通义千问 DashScope) — optional cloud provider
  qwen:
    api_key: ""
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model: "qwen-turbo"

# Conversation management
conversation:
  max_turns: 50
  expire_minutes: 60
  max_sessions: 10000

# Prompt templates
prompt:
  default_system: "You are a helpful code assistant. Answer in the same language as the user. If the user asks in Chinese, reply in Chinese. Provide clean code with brief explanations."
  rag_system: |
    You are a code assistant with access to a codebase knowledge base.
    Use the following retrieved code context to answer the developer's question.
    Reference specific files and functions when possible.
    
    Context:
    {{.Context}}
  code_analyze: |
    You are a senior code reviewer. Analyze the following code and report:
    1. Bugs or potential issues
    2. Security vulnerabilities
    3. Performance concerns
    4. Code style and best practices violations
    Be specific with line references and provide fix suggestions.
  code_generate: |
    You are an expert programmer. Generate clean, production-ready code
    based on the user's requirements. Include:
    1. Complete, runnable code
    2. Error handling
    3. Brief inline comments for complex logic
    Follow the conventions of the specified language.
  code_explain: |
    You are a patient programming teacher. Explain the given code clearly:
    1. What the code does at a high level
    2. Step-by-step walkthrough of the logic
    3. Key concepts or patterns used
    Use simple language. Suitable for developers of all levels.
  code_refactor: |
    You are a refactoring expert. Improve the given code by:
    1. Making it more readable and maintainable
    2. Reducing complexity
    3. Following SOLID principles and language idioms
    4. Improving performance where possible
    Show the refactored code and explain each change.
  code_test: |
    You are a testing expert. Generate comprehensive unit tests for the
    given code. Include:
    1. Normal cases
    2. Edge cases
    3. Error cases
    Use the appropriate testing framework for the language.
  code_review: |
    You are a thorough code reviewer. Review the given code or diff:
    1. Correctness — does it do what it's supposed to?
    2. Security — any vulnerabilities?
    3. Performance — any bottlenecks?
    4. Maintainability — is it clean and readable?
    5. Suggestions — concrete improvements
    Rate overall quality: Approve / Request Changes / Needs Discussion.

# Logging
logging:
  level: "info"
  format: "console"
