server:
  host: "0.0.0.0"
  port: 11434        # Same as Ollama default port
  read_timeout: 300   # seconds — inference can be slow
  write_timeout: 300
  mode: "debug"

# Model storage
models:
  dir: "./models"
  default: "qwen2.5-0.5b-instruct-q8_0"

# Default inference parameters
inference:
  num_ctx: 2048        # Reduce context to save memory for 7B model
  num_thread: 0        # 0 = auto-detect (runtime.NumCPU)
  num_gpu: 0           # GPU layers to offload (0 = CPU only)
  batch_size: 256      # Smaller batch for memory efficiency

# Default sampling parameters
sampling:
  temperature: 0.7
  top_p: 0.9
  top_k: 40
  repeat_penalty: 1.1
  num_predict: 256     # Limit output length for faster response
  seed: -1

logging:
  level: "info"
  format: "console"
