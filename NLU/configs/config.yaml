# NLU Microservice Configuration
#
# Architecture: NLU(:8080) → RAG(:8081) → LLM-Generation(:8082) → Local-LLM(:11434)
# Local-LLM (C++) provides OpenAI-compatible /v1/chat/completions API.

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 600   # seconds (LLM inference can be slow)
  write_timeout: 600  # seconds
  mode: "debug"       # "debug", "release", "test"

llm:
  provider: "openai"  # "openai" to use Local-LLM via OpenAI-compatible API
  temperature: 0.1
  max_tokens: 2048
  max_retries: 3
  timeout: 600  # seconds (local model inference may take time)

  # OpenAI-compatible API → points to Local-LLM (C++)
  openai:
    api_key: "not-needed"  # Local-LLM doesn't require an API key
    base_url: "http://localhost:11434/v1"  # Local-LLM C++ OpenAI-compatible endpoint
    model: "Qwen2.5-Coder-7B-Instruct-Q4_K_M"
    org_id: ""

  # Native Ollama API (backup/alternative)
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5-coder:7b-instruct-q4_K_M"

nlu:
  default_capabilities:
    - "intent"
    - "ner"
    - "sentiment"
  max_dialog_turns: 20
  domain_schema_path: "./configs/domain.yaml"
  prompt_template_path: "./configs/prompts"
  cache_enabled: true
  cache_ttl: 300  # seconds

logging:
  level: "info"     # "debug", "info", "warn", "error"
  format: "console" # "json", "console"

# Peer service endpoints
services:
  rag:
    base_url: "http://localhost:8081"
    timeout: 600  # seconds
  llm_generation:
    base_url: "http://localhost:8082"
    timeout: 600  # seconds
