# NLU Domain Schema - Code Analysis & Generation
# Defines intents, entity types, and slot definitions for code-related tasks.

name: "code"
description: "NLU domain schema for code writing, analysis, and review"

# Supported intents
intents:
  - name: "code_analyze"
    description: "User wants to analyze code for bugs, complexity, or security issues"
    examples:
      - "分析这段代码"
      - "这段代码有什么问题"
      - "检查一下这个函数"
      - "analyze this code"
      - "find bugs in this code"
      - "这个代码有安全隐患吗"

  - name: "code_generate"
    description: "User wants to generate code from a description"
    examples:
      - "帮我写一个函数"
      - "生成一个排序算法"
      - "write a function that"
      - "implement a REST API"
      - "用Go写一个HTTP服务器"
      - "create a class that"

  - name: "code_explain"
    description: "User wants an explanation of what code does"
    examples:
      - "这段代码是做什么的"
      - "解释一下这个函数"
      - "explain this code"
      - "what does this function do"
      - "这行代码什么意思"

  - name: "code_refactor"
    description: "User wants to refactor or optimize existing code"
    examples:
      - "优化这段代码"
      - "重构一下这个函数"
      - "refactor this code"
      - "make this code more efficient"
      - "这段代码怎么改更好"
      - "simplify this function"

  - name: "code_test"
    description: "User wants to generate unit tests for code"
    examples:
      - "帮我写单元测试"
      - "生成测试用例"
      - "write tests for this function"
      - "generate unit tests"
      - "这个函数怎么测试"

  - name: "code_review"
    description: "User wants a code review or diff analysis"
    examples:
      - "帮我review这段代码"
      - "代码审查"
      - "review this pull request"
      - "compare these two implementations"
      - "这两个版本有什么区别"

  - name: "code_debug"
    description: "User needs help debugging an error"
    examples:
      - "这个报错怎么解决"
      - "为什么会出现这个错误"
      - "debug this error"
      - "how to fix this exception"
      - "运行报错了"

  - name: "code_document"
    description: "User wants to generate documentation or comments"
    examples:
      - "帮我写注释"
      - "生成API文档"
      - "add documentation to this code"
      - "write comments for this function"

  - name: "ask_question"
    description: "User asks a general programming question"
    examples:
      - "什么是goroutine"
      - "Go和Rust有什么区别"
      - "how does garbage collection work"
      - "explain the difference between TCP and UDP"

  - name: "unknown"
    description: "Unrecognized intent"
    examples: []

# Supported entity types
entity_types:
  - name: "LANGUAGE"
    description: "Programming language"
    examples: ["Go", "Python", "Java", "Rust", "TypeScript", "C++"]

  - name: "FRAMEWORK"
    description: "Framework or library name"
    examples: ["Gin", "React", "Spring", "Django", "Express"]

  - name: "CONCEPT"
    description: "Programming concept or pattern"
    examples: ["goroutine", "mutex", "interface", "generics", "closure"]

  - name: "ERROR_TYPE"
    description: "Error or exception type"
    examples: ["NullPointerException", "segfault", "panic", "TypeError", "404"]

  - name: "FILE_PATH"
    description: "File or directory path"
    examples: ["main.go", "src/index.ts", "/usr/local/bin"]

  - name: "FUNCTION_NAME"
    description: "Function or method name"
    examples: ["handleRequest", "sort", "parseInt", "main"]

  - name: "PACKAGE"
    description: "Package or module name"
    examples: ["fmt", "net/http", "react", "numpy"]

  - name: "DATA_STRUCTURE"
    description: "Data structure type"
    examples: ["array", "map", "linked list", "binary tree", "queue"]

  - name: "ALGORITHM"
    description: "Algorithm name"
    examples: ["quicksort", "binary search", "BFS", "dynamic programming"]

  - name: "TOOL"
    description: "Development tool"
    examples: ["Docker", "Git", "Kubernetes", "VS Code", "Webpack"]

# Slot definitions
slot_definitions:
  - name: "language"
    type: "text"
    required: false
    prompt: "Which programming language?"
    description: "Target programming language"

  - name: "code_input"
    type: "text"
    required: false
    prompt: "Please provide the code to analyze."
    description: "The code snippet to work with"

  - name: "task_description"
    type: "text"
    required: false
    prompt: "What should the code do?"
    description: "Description of what code to generate"

  - name: "framework"
    type: "text"
    required: false
    description: "Target framework or library"

  - name: "test_framework"
    type: "text"
    required: false
    description: "Testing framework to use"
    enum: ["testing", "pytest", "jest", "junit", "mocha", "ginkgo"]

  - name: "style"
    type: "text"
    required: false
    description: "Code style or convention"
    enum: ["clean", "verbose", "minimal", "production", "prototype"]

# Text classification categories
categories:
  - "code_writing"
  - "code_analysis"
  - "code_review"
  - "debugging"
  - "learning"
  - "architecture"
  - "devops"
